<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Name Card</title>

    <style>
        body{display:flex ; justify-content:center;gap:20pxx;align-items:center; flex-wrap:wrap;}
        .card{
            background-color: rgb(214, 171, 119);
            border: 3px solid saddlebrown; border-radius: 5px; color:saddlebrown;

        p{font-size: 25px; }
        .card img{ object-fit:cover;}
    </style>
</head>
<body>
    <div class="card">
        <p> Lekshmy SS</p>
    </div>
</body>
